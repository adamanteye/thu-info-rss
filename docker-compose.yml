services:
  rss-feeder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: info-scraper-rss
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      # Mount data directory for persistent SQLite database
      - ./data:/data
    environment:
      # Database path (in mounted volume)
      - DB_PATH=/data/articles.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
